<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Found Item - KyU</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="kirinyaga.css">
  <link rel="stylesheet" href="found.css">
  <script src="app.js"></script>
</head>
<body>
  <div class="header-top">
    <div class="logo-kirinyaga"><i class="fa-solid fa-users"></i><span>KyU Community</span></div>
    <div class="header-buttons"></div>
  </div>

  <div class="form-container">
    <div class="form-header">
      <h1><i class="fa-solid fa-magnifying-glass" style="color:#F4A300"></i> Report a Found Item</h1>
      <p>Help someone reunite with their belonging</p>
    </div>
    <div class="form-content">

      <div class="form-group">
        <label for="imageUpload">Upload Image <span style="color:#aaa;font-weight:400">(helps owner identify it)</span></label>
        <div class="file-upload" id="dropZone"
          onclick="document.getElementById('imageUpload').click()"
          ondrop="handleDrop(event)" ondragover="ev=>ev.preventDefault()">
          <i class="fa-solid fa-cloud-upload-alt"></i>
          <p id="fileName">Click to select or drag an image here</p>
        </div>
        <input type="file" id="imageUpload" name="image" accept="image/*" onchange="handleImage(this)">
        <img id="imgPreview" class="kyu-img-preview" alt="preview">
      </div>

      <div class="form-group">
        <label for="description">Description *</label>
        <textarea id="description" placeholder="Describe the item (color, brand, unique marks...)"></textarea>
        <div class="field-err" id="descErr"></div>
      </div>

      <div class="form-group">
        <label for="location">Location Found *</label>
        <input type="text" id="location" placeholder="e.g., Library, Cafeteria, Diaspora, Mjini, Ngomongo...">
        <div class="field-err" id="locErr"></div>
      </div>

      <div class="form-group">
        <label for="dateFound">Date Found *</label>
        <input type="date" id="dateFound">
        <div class="field-err" id="dateErr"></div>
      </div>

      <div class="form-group">
        <label for="securityQ">Security Question <span style="color:#aaa;font-weight:400">(optional – helps verify owner)</span></label>
        <input type="text" id="securityQ" placeholder="e.g., What is inside the bag?">
      </div>

      <div class="form-group">
        <label for="handoverLocation">Where is it now?</label>
        <input type="text" id="handoverLocation" placeholder="e.g., Held by security office, Main gate desk">
      </div>

      <div class="safety-tip">
        <i class="fa-solid fa-shield-halved"></i>
        <strong>Safety Tip:</strong> Do not include personal contact details in the description. We will handle communication securely.
      </div>

      <button class="btn-submit" id="submitBtn" onclick="submitForm()" style="margin-top:1.5rem">
        <i class="fa-solid fa-check"></i> Submit Found Item
      </button>

      <a href="found.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Found Items</a>
    </div>
  </div>

  <footer style="margin-top:0;text-align:center;padding:1rem;background:#1A2E40;color:white">
    <p>&copy; 2026 Kirinyaga University Community</p>
  </footer>

  <style>.field-err{color:#dc3545;font-size:.82rem;margin-top:.3rem;display:none}</style>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let imageBase64 = null;

    document.addEventListener('DOMContentLoaded', () => {
      if (!KyU.auth.requireAuth()) return;
      document.getElementById('dateFound').max = new Date().toISOString().split('T')[0];
      document.getElementById('dateFound').value = new Date().toISOString().split('T')[0];
    });

    async function handleImage(input) {
      if (!input.files.length) return;
      const file = input.files[0];
      document.getElementById('fileName').textContent = file.name;
      imageBase64 = await KyU.resizeImage(file);
      const prev = document.getElementById('imgPreview');
      prev.src = imageBase64; prev.style.display = 'block';
    }

    function handleDrop(e) {
      e.preventDefault();
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        const input = document.getElementById('imageUpload');
        const dt = new DataTransfer(); dt.items.add(file); input.files = dt.files;
        handleImage(input);
      }
    }

    function showErr(id, msg) { const e=document.getElementById(id); e.textContent=msg; e.style.display='block'; }
    function clearErr(id)     { document.getElementById(id).style.display='none'; }

    function submitForm() {
      const desc = document.getElementById('description').value.trim();
      const loc  = document.getElementById('location').value.trim();
      const dt   = document.getElementById('dateFound').value;
      let ok = true;
      if (!desc) { showErr('descErr','Please describe the item.'); ok=false; } else clearErr('descErr');
      if (!loc)  { showErr('locErr','Please enter where you found it.'); ok=false; } else clearErr('locErr');
      if (!dt)   { showErr('dateErr','Please select the date.'); ok=false; } else clearErr('dateErr');
      if (!ok) return;

      const user = KyU.auth.currentUser();
      const btn  = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving…';

      const item = {
        description:     desc,
        location:        loc,
        dateFound:       dt,
        securityQ:       document.getElementById('securityQ').value.trim(),
        handoverLocation:document.getElementById('handoverLocation').value.trim(),
        image:           imageBase64,
        postedBy:        user.id,
        postedByName:    user.name,
        status:          'unclaimed'
      };

      setTimeout(() => {
        KyU.storage.saveItem('found', item);
        KyU.ui.toast('Found item reported! Thank you for helping 🙏','success');
        setTimeout(() => window.location.href = 'found.html', 1000);
      }, 600);
    }
  </script>
</body>
</html>
